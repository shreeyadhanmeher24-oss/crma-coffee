<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout - CRMA</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="cart-page">

  <nav class="navbar">
    <div class="logo">CRMA ☕</div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/orders">My Orders</a></li>
      <li><a href="/cart">Cart 🛒</a></li>
      <li class="user-greet">Hi, {{ session['user'] }}</li>
      <li><a href="/logout">Logout</a></li>
    </ul>
  </nav>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-wrapper" id="flash-box">
        {% for category, message in messages %}
          <div class="flash-message {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <section class="cart-section">
    <h1>Checkout</h1>

    <div class="auth-box">
      <form action="/place-order" method="POST">
        <input type="text" name="fullname" placeholder="Full Name" required />
        <input type="text" name="phone" placeholder="Phone Number" required />
        <input type="text" name="address" placeholder="Delivery Address" required />
        <input type="text" name="city" placeholder="City" required />
        <input type="text" name="pincode" placeholder="Pincode" required />

        <select name="payment" required class="checkout-select">
          <option value="">Select Payment Method</option>
          <option value="Cash on Delivery">Cash on Delivery</option>
          <option value="UPI">UPI</option>
          <option value="Card">Card</option>
        </select>

        <button type="submit">Place Order</button>
      </form>
    </div>
  </section>

  <script>
    const flashBox = document.getElementById("flash-box");
    if (flashBox) {
      setTimeout(() => {
        flashBox.style.opacity = "0";
        flashBox.style.transform = "translateX(-50%) translateY(-10px)";
        setTimeout(() => {
          flashBox.style.display = "none";
        }, 500);
      }, 2500);
    }
  </script>

</body>
</html>
